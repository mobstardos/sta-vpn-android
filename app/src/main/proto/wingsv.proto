syntax = "proto3";

package wingsv;

option java_package = "wings.v.proto";
option java_outer_classname = "WingsvProto";
option optimize_for = LITE_RUNTIME;
option go_package = "v.wingsnet.org/internal/gen/wingsvpb";

message Config {
  uint32 ver = 1;
  ConfigType type = 2;
  Turn turn = 3;
  WireGuard wg = 4;
  BackendType backend = 5;
  Xray xray = 6;
  AmneziaWG awg = 7;
  AppRouting app_routing = 8;
  WbStream wb_stream = 9;
  Xposed xposed = 10;
  RootSettings root = 11;
  AppPreferences app_preferences = 12;
  SubscriptionHwid subscription_hwid = 13;
  Sharing sharing = 14;
  ByeDpi bye_dpi = 15;
  Guardian guardian = 16;
  // Монотонно растущая ревизия конфига, выставляется панелью при
  // UpsertClientConfig. Клиент сохраняет её при успешном apply и шлёт
  // обратно в ClientHello.last_applied_config_version — сервер на welcome
  // решает, нужен ли вообще ConfigPush, и тем самым не «перезатирает»
  // только что отредактированные админом поля на reconnect-гонке.
  uint64 config_version = 17;
}

enum ConfigType {
  CONFIG_TYPE_UNSPECIFIED = 0;
  CONFIG_TYPE_VK = 1;
  CONFIG_TYPE_XRAY = 2;
  CONFIG_TYPE_AMNEZIAWG = 3;
  CONFIG_TYPE_ALL = 4;
  CONFIG_TYPE_APP_ROUTING = 5;
  CONFIG_TYPE_XRAY_ROUTING = 6;
  CONFIG_TYPE_WB_STREAM = 7;
  CONFIG_TYPE_XPOSED = 8;
  CONFIG_TYPE_GUARDIAN = 9;
}

message Guardian {
  string ws_url = 1;
  string client_id = 2;
  bytes client_token = 3;
  string client_name = 4;
  GuardianSyncMode sync_mode = 5;
  uint32 periodic_interval_minutes = 6;
}

enum GuardianSyncMode {
  GUARDIAN_SYNC_MODE_UNSPECIFIED = 0;
  GUARDIAN_SYNC_MODE_ALWAYS = 1;
  GUARDIAN_SYNC_MODE_PERIODIC = 2;
  GUARDIAN_SYNC_MODE_FOREGROUND_ONLY = 3;
}

// BackendType — top-level выбор пользователя. Legacy-значения
// BACKEND_TYPE_VK_TURN_WIREGUARD / BACKEND_TYPE_AMNEZIAWG /
// BACKEND_TYPE_AMNEZIAWG_PLAIN остаются для совместимости со старыми
// конфигами и читателями; новые конфиги используют BACKEND_TYPE_VK_TURN
// + Turn.tunnel_mode и BACKEND_TYPE_AMNEZIAWG_PLAIN → BACKEND_TYPE_AMNEZIAWG
// (без подтипа). Маппинг см. в Android BackendType.fromProto / WingsImportParser.
enum BackendType {
  BACKEND_TYPE_UNSPECIFIED = 0;
  BACKEND_TYPE_VK_TURN_WIREGUARD = 1 [deprecated = true];  // legacy alias for VK_TURN + WG
  BACKEND_TYPE_XRAY = 2;
  BACKEND_TYPE_AMNEZIAWG = 3 [deprecated = true];          // legacy alias for VK_TURN + AWG
  BACKEND_TYPE_WIREGUARD = 4;
  BACKEND_TYPE_AMNEZIAWG_PLAIN = 5 [deprecated = true];    // legacy alias for top-level AmneziaWG
  BACKEND_TYPE_WB_STREAM = 6;
  BACKEND_TYPE_VK_TURN = 7;       // top-level "VK TURN"; реальный туннель — по Turn.tunnel_mode
  BACKEND_TYPE_AMNEZIAWG_TL = 8;  // top-level "AmneziaWG" (заменяет AMNEZIAWG_PLAIN)
}

// TunnelMode — какой тип туннеля поднимать внутри backend-обёртки.
// Применимо к BACKEND_TYPE_VK_TURN (Turn.tunnel_mode) и BACKEND_TYPE_WB_STREAM
// (WbStream.tunnel_mode). Для top-level WIREGUARD / AMNEZIAWG_TL / XRAY значение
// игнорируется — тип туннеля жёстко задан backend'ом.
enum TunnelMode {
  TUNNEL_MODE_UNSPECIFIED = 0;
  TUNNEL_MODE_WIREGUARD = 1;
  TUNNEL_MODE_AMNEZIAWG = 2;
}

message WbStream {
  string room_id = 1;
  bool exchange_via_vk_turn = 2;
  bool e2e_enabled = 3;
  bytes e2e_secret = 4;
  string display_name = 5;
  optional uint32 room_count = 6;
  // Какой туннель пускать поверх WB Stream userspace-прокси: WG или AWG.
  // UNSPECIFIED трактуется как WIREGUARD (поведение до введения поля).
  TunnelMode tunnel_mode = 7;
}

message AmneziaWG {
  string awg_quick_config = 1;
}

message Endpoint {
  string host = 1;
  uint32 port = 2;
}

message Cidr {
  bytes addr = 1;
  uint32 prefix = 2;
}

message Turn {
  Endpoint endpoint = 1;
  string link = 2;
  optional uint32 threads = 3;
  optional bool use_udp = 4;
  optional bool no_obfuscation = 5;
  Endpoint local_endpoint = 6;
  string host = 7;
  optional uint32 port = 8;
  TurnSessionMode session_mode = 9;
  repeated string links = 10;
  string link_secondary = 11;
  optional uint32 creds_group_size = 12;
  optional bool manual_captcha = 13;
  string captcha_auto_solver = 14;
  optional bool restart_on_network_change = 15;
  ProxyRuntimeMode runtime_mode = 16;
  // Пользовательские DNS-резолверы, ставятся ПЕРЕД встроенным (yandex →
  // google → cloudflare). Каждая запись — одна строка в формате URL:
  //   https://dns.example/dns-query  (DoH)
  //   udp://77.88.8.8:53             (plain UDP/53; порт необязателен)
  //   77.88.8.8                      (то же самое, plain UDP/53)
  // Записи без ответа на bootstrap-резолюции просто отбрасываются;
  // в любом случае встроенный список остаётся как fallback.
  repeated string user_dns = 17;
  // Какой туннель пускать поверх VK TURN userspace-прокси: WG или AWG.
  // UNSPECIFIED трактуется как WIREGUARD (поведение до введения поля).
  TunnelMode tunnel_mode = 18;
}

enum TurnSessionMode {
  TURN_SESSION_MODE_UNSPECIFIED = 0;
  TURN_SESSION_MODE_AUTO = 1;
  TURN_SESSION_MODE_MAINLINE = 2;
  TURN_SESSION_MODE_MUX = 3;
}

enum ProxyRuntimeMode {
  PROXY_RUNTIME_MODE_UNSPECIFIED = 0;
  PROXY_RUNTIME_MODE_VPN = 1;
  PROXY_RUNTIME_MODE_PROXY = 2;
}

message WireGuard {
  Interface iface = 1;
  Peer peer = 2;
  Endpoint endpoint = 3;
}

message Interface {
  bytes private_key = 1;
  repeated string addrs = 2;
  repeated string dns = 3;
  optional uint32 mtu = 4;
}

message Peer {
  bytes public_key = 1;
  bytes preshared_key = 2;
  repeated Cidr allowed_ips = 3;
}

message Xray {
  string active_profile_id = 1;
  repeated VlessProfile profiles = 2;
  repeated Subscription subscriptions = 3;
  XraySettings settings = 4;
  string subscription_json = 5;
  optional bool merge_only = 6;
  XrayRouting routing = 7;
}

message AppRouting {
  optional bool bypass = 1;
  repeated string packages = 2;
}

message XrayRouting {
  repeated XrayRoutingRule rules = 1;
  string geoip_url = 2;
  string geosite_url = 3;
}

message XrayRoutingRule {
  string id = 1;
  XrayRoutingMatchType match_type = 2;
  string code = 3;
  XrayRoutingAction action = 4;
  optional bool enabled = 5;
}

enum XrayRoutingMatchType {
  XRAY_ROUTING_MATCH_UNSPECIFIED = 0;
  XRAY_ROUTING_MATCH_GEOIP = 1;
  XRAY_ROUTING_MATCH_GEOSITE = 2;
  XRAY_ROUTING_MATCH_DOMAIN = 3;
  XRAY_ROUTING_MATCH_IP = 4;
  XRAY_ROUTING_MATCH_PORT = 5;
}

enum XrayRoutingAction {
  XRAY_ROUTING_ACTION_UNSPECIFIED = 0;
  XRAY_ROUTING_ACTION_PROXY = 1;
  XRAY_ROUTING_ACTION_DIRECT = 2;
  XRAY_ROUTING_ACTION_BLOCK = 3;
}

message Subscription {
  string id = 1;
  string title = 2;
  string url = 3;
  string format_hint = 4;
  optional uint32 refresh_interval_hours = 5;
  optional bool auto_update = 6;
  optional int64 last_updated_at = 7;
  optional uint32 refresh_interval_minutes = 8;
}

message VlessProfile {
  string id = 1;
  string title = 2;
  string raw_link = 3;
  string subscription_id = 4;
  string subscription_title = 5;
  string address = 6;
  optional uint32 port = 7;
}

message XraySettings {
  optional bool allow_lan = 1;
  optional bool allow_insecure = 2;
  optional uint32 local_proxy_port = 3;
  string remote_dns = 4;
  string direct_dns = 5;
  optional bool ipv6 = 6;
  optional bool sniffing_enabled = 7;
  optional bool proxy_quic_enabled = 8;
  optional bool local_proxy_enabled = 9;
  optional bool local_proxy_auth_enabled = 10;
  string local_proxy_username = 11;
  string local_proxy_password = 12;
  optional bool restart_on_network_change = 13;
  XrayTransportMode transport_mode = 14;
  ProxyRuntimeMode runtime_mode = 15;
}

enum XrayTransportMode {
  XRAY_TRANSPORT_MODE_UNSPECIFIED = 0;
  XRAY_TRANSPORT_MODE_DIRECT = 1;
  XRAY_TRANSPORT_MODE_VK_TURN_TCP = 2;
}

message Xposed {
  optional bool enabled = 1;
  optional bool all_apps = 2;
  optional bool native_hook_enabled = 3;
  optional bool inline_hooks_enabled = 4;
  optional bool hide_vpn_apps = 5;
  optional bool hide_from_dumpsys = 6;
  XposedProcfsHookMode procfs_hook_mode = 7;
  XposedIcmpSpoofingMode icmp_spoofing_mode = 8;
  repeated string target_packages = 9;
  repeated string hidden_vpn_packages = 10;
}

enum XposedProcfsHookMode {
  XPOSED_PROCFS_HOOK_MODE_UNSPECIFIED = 0;
  XPOSED_PROCFS_HOOK_MODE_DISABLED = 1;
  XPOSED_PROCFS_HOOK_MODE_FILTER = 2;
  XPOSED_PROCFS_HOOK_MODE_NO_ACCESS = 3;
  XPOSED_PROCFS_HOOK_MODE_FILE_NOT_FOUND = 4;
}

enum XposedIcmpSpoofingMode {
  XPOSED_ICMP_SPOOFING_MODE_UNSPECIFIED = 0;
  XPOSED_ICMP_SPOOFING_MODE_DISABLED = 1;
  XPOSED_ICMP_SPOOFING_MODE_PING_NOT_FOUND = 2;
  XPOSED_ICMP_SPOOFING_MODE_EMPTY_RESPONSE = 3;
}

message RootSettings {
  optional bool enabled = 1;
  optional bool kernel_wireguard = 2;
  optional bool xray_tproxy_mode = 3;
  string wg_interface_name = 4;
}

message AppPreferences {
  ThemeMode theme_mode = 1;
  optional bool auto_start_on_boot = 2;
  DnsMode dns_mode = 3;
}

enum ThemeMode {
  THEME_MODE_UNSPECIFIED = 0;
  THEME_MODE_LIGHT = 1;
  THEME_MODE_DARK = 2;
  THEME_MODE_SYSTEM = 3;
}

enum DnsMode {
  DNS_MODE_UNSPECIFIED = 0;
  DNS_MODE_AUTO = 1;
  DNS_MODE_UDP = 2;
  DNS_MODE_DOH = 3;
}

message SubscriptionHwid {
  optional bool enabled = 1;
  optional bool manual_enabled = 2;
  string value = 3;
  string device_os = 4;
  string ver_os = 5;
  string device_model = 6;
}

message Sharing {
  optional bool auto_start_on_boot = 1;
  repeated string last_active_types = 2;
  string upstream_interface = 3;
  string fallback_upstream_interface = 4;
  SharingMasqueradeMode masquerade_mode = 5;
  optional bool disable_ipv6 = 6;
  optional bool dhcp_workaround = 7;
  SharingWifiLock wifi_lock = 8;
  optional bool repeater_safe_mode = 9;
  optional bool temp_hotspot_use_system = 10;
  SharingIpMonitorMode ip_monitor_mode = 11;
}

enum SharingMasqueradeMode {
  SHARING_MASQUERADE_MODE_UNSPECIFIED = 0;
  SHARING_MASQUERADE_MODE_NONE = 1;
  SHARING_MASQUERADE_MODE_SIMPLE = 2;
  SHARING_MASQUERADE_MODE_NETD = 3;
}

enum SharingWifiLock {
  SHARING_WIFI_LOCK_UNSPECIFIED = 0;
  SHARING_WIFI_LOCK_SYSTEM = 1;
  SHARING_WIFI_LOCK_FULL = 2;
  SHARING_WIFI_LOCK_HIGH_PERF = 3;
  SHARING_WIFI_LOCK_LOW_LATENCY = 4;
}

enum SharingIpMonitorMode {
  SHARING_IP_MONITOR_MODE_UNSPECIFIED = 0;
  SHARING_IP_MONITOR_MODE_NETLINK = 1;
  SHARING_IP_MONITOR_MODE_NETLINK_ROOT = 2;
  SHARING_IP_MONITOR_MODE_POLL = 3;
  SHARING_IP_MONITOR_MODE_POLL_ROOT = 4;
}

message ByeDpi {
  optional bool auto_start_with_xray = 1;
  optional bool use_command_settings = 2;
  string proxy_ip = 3;
  optional uint32 proxy_port = 4;
  optional bool proxy_auth_enabled = 5;
  string proxy_username = 6;
  string proxy_password = 7;
  optional uint32 max_connections = 8;
  optional uint32 buffer_size = 9;
  optional bool no_domain = 10;
  optional bool tcp_fast_open = 11;
  ByeDpiHostsMode hosts_mode = 12;
  string hosts_blacklist = 13;
  string hosts_whitelist = 14;
  optional uint32 default_ttl = 15;
  ByeDpiDesyncMethod desync_method = 16;
  optional uint32 split_position = 17;
  optional bool split_at_host = 18;
  optional bool drop_sack = 19;
  optional uint32 fake_ttl = 20;
  optional uint32 fake_offset = 21;
  string fake_sni = 22;
  string oob_data = 23;
  optional bool desync_http = 24;
  optional bool desync_https = 25;
  optional bool desync_udp = 26;
  optional bool host_mixed_case = 27;
  optional bool domain_mixed_case = 28;
  optional bool host_remove_spaces = 29;
  optional bool tlsrec_enabled = 30;
  optional uint32 tlsrec_position = 31;
  optional bool tlsrec_at_sni = 32;
  optional uint32 udp_fake_count = 33;
  string cmd_args = 34;
  optional uint32 proxytest_delay = 35;
  optional uint32 proxytest_requests = 36;
  optional uint32 proxytest_limit = 37;
  optional uint32 proxytest_timeout = 38;
  string proxytest_sni = 39;
  optional bool proxytest_use_custom_strategies = 40;
  string proxytest_custom_strategies = 41;
}

enum ByeDpiHostsMode {
  BYE_DPI_HOSTS_MODE_UNSPECIFIED = 0;
  BYE_DPI_HOSTS_MODE_DISABLE = 1;
  BYE_DPI_HOSTS_MODE_BLACKLIST = 2;
  BYE_DPI_HOSTS_MODE_WHITELIST = 3;
}

enum ByeDpiDesyncMethod {
  BYE_DPI_DESYNC_METHOD_UNSPECIFIED = 0;
  BYE_DPI_DESYNC_METHOD_NONE = 1;
  BYE_DPI_DESYNC_METHOD_SPLIT = 2;
  BYE_DPI_DESYNC_METHOD_DISORDER = 3;
  BYE_DPI_DESYNC_METHOD_FAKE = 4;
  BYE_DPI_DESYNC_METHOD_OOB = 5;
  BYE_DPI_DESYNC_METHOD_DISOOB = 6;
}

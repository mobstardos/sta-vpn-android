name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' &&
        (github.event.head_commit == null || !contains(github.event.head_commit.message, '[SKIP CI]')))
    env:
      ORG_GRADLE_PROJECT_seslUser: ${{ secrets.SESL_USER }}
      ORG_GRADLE_PROJECT_seslToken: ${{ secrets.SESL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.SUBMODULES_TOKEN || github.token }}

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v5

      - name: Set up Go 1.25.5
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.5"
          check-latest: true
          cache-dependency-path: |
            external/vk-turn-proxy/go.sum
            external/libXray/go.sum
            external/Xray-core/go.sum
            external/amneziawg-android/tunnel/tools/libwg-go/go.sum

      - name: Cache vk-turn-proxy Go build state
        uses: actions/cache@v5
        with:
          path: |
            .gradle/vkturn/go-mod-cache
            .gradle/vkturn/go-cache
          key: ${{ runner.os }}-vkturn-go-${{ hashFiles('external/vk-turn-proxy/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-vkturn-go-

      - name: Cache libXray Go build state
        uses: actions/cache@v5
        with:
          path: |
            .gradle/libxray/go-mod-cache
            .gradle/libxray/go-cache
            .gradle/libxray/go-path
            .gradle/libxray/go-bin
          key: ${{ runner.os }}-libxray-go-${{ hashFiles('external/libXray/go.mod', 'external/libXray/go.sum', 'external/libXray/build/**/*.py') }}
          restore-keys: |
            ${{ runner.os }}-libxray-go-

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager --install \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;28.2.13676358" \
            "cmake;3.22.1"

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler zstd

      - name: Resolve build version
        id: resolve-version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$(sed -nE 's/^val defaultAppVersionName = "([^"]+)"$/\1/p' app/build.gradle.kts | head -n1)"
          fi
          if [[ -z "${version}" ]]; then
            echo "Failed to resolve build version" >&2
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Prepare signing config
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"
          mkdir -p keystore
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > keystore/wingsv-release.jks
          cat > keystore.properties <<EOF
          storeFile=keystore/wingsv-release.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Assemble release APK
        run: ./gradlew :app:assembleRelease -Pver=${{ steps.resolve-version.outputs.version }}

      - name: Build release patch
        id: build-patch
        env:
          GITHUB_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.resolve-version.outputs.version }}
          API_URL: https://api.github.com/repos/${{ github.repository }}/releases?per_page=4
        shell: bash
        run: |
          set -euo pipefail
          previous_apk_url="$(python .github/scripts/find_previous_release_apk.py)"
          if [[ -z "${previous_apk_url}" ]]; then
            echo "patch_generated=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          patch_file="app/build/outputs/apk/release/wings-v_v${VERSION}.patch"
          curl --fail --location \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/octet-stream" \
            "${previous_apk_url}" \
            -o previous-release.apk
          zstd -q -19 --patch-from previous-release.apk app/build/outputs/apk/release/app-release.apk -o "${patch_file}"
          echo "patch_generated=true" >> "${GITHUB_OUTPUT}"
          echo "patch_file=${patch_file}" >> "${GITHUB_OUTPUT}"

      - name: Build release checksums
        id: build-checksums
        shell: bash
        run: |
          set -euo pipefail
          apk_file="app/build/outputs/apk/release/app-release.apk"
          sha256sum "${apk_file}" | awk '{print $1}' > "${apk_file}.sha256"
          sha512sum "${apk_file}" | awk '{print $1}' > "${apk_file}.sha512"
          if [[ "${{ steps.build-patch.outputs.patch_generated }}" == "true" ]]; then
            patch_file="${{ steps.build-patch.outputs.patch_file }}"
            sha256sum "${patch_file}" | awk '{print $1}' > "${patch_file}.sha256"
            sha512sum "${patch_file}" | awk '{print $1}' > "${patch_file}.sha512"
          fi

      - name: Compute commit log since previous tag
        id: commit-log
        shell: bash
        run: |
          set -euo pipefail
          prev_tag="$(git describe --tags --abbrev=0 "${GITHUB_SHA}^" 2>/dev/null || true)"
          if [[ -z "${prev_tag}" ]]; then
            log="$(git log --pretty=format:'%h %s' --no-merges)"
          else
            log="$(git log "${prev_tag}..HEAD" --pretty=format:'%h %s' --no-merges)"
          fi
          {
            echo "prev_tag=${prev_tag}"
            echo "log<<__LOG_EOF__"
            echo "${log}"
            echo "__LOG_EOF__"
          } >> "${GITHUB_OUTPUT}"

      - name: Generate release notes via Claude
        id: claude-notes
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Сгенерируй release notes для версии ${{ steps.resolve-version.outputs.version }} на русском языке в формате Markdown.

            Коммиты с прошлого релиза (${{ steps.commit-log.outputs.prev_tag }}) до текущего:
            ```
            ${{ steps.commit-log.outputs.log }}
            ```

            Правила:
            - Используй ровно 4 категории: «Добавлено», «Исправлено», «Изменено», «Удалено».
            - Если категория пустая — не выводи её заголовок.
            - Каждый пункт — короткое пользовательское описание (не разработческое), 1 строка.
            - Игнорируй коммиты с тегом `[ignore]:`.
            - Связанные коммиты (например, порт фичи + bump подмодуля) объединяй в один пункт.
            - Не добавляй вводный текст, дату, версию, footer — только заголовки категорий и буллеты.
            - Запиши итог в файл `release-notes.md` в корне репозитория.

      - name: Fallback release notes
        if: steps.claude-notes.outcome != 'success' || hashFiles('release-notes.md') == ''
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "### Изменения"
            echo ""
            echo "${{ steps.commit-log.outputs.log }}" | grep -v '^[0-9a-f]\+ \[ignore\]:' | sed 's/^[0-9a-f]\+ /- /'
          } > release-notes.md

      - name: Publish GitHub release APK
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          body_path: release-notes.md
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/apk/release/app-release.apk.sha256
            app/build/outputs/apk/release/app-release.apk.sha512

      - name: Publish GitHub release patch
        if: steps.build-patch.outputs.patch_generated == 'true'
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            ${{ steps.build-patch.outputs.patch_file }}
            ${{ steps.build-patch.outputs.patch_file }}.sha256
            ${{ steps.build-patch.outputs.patch_file }}.sha512

      - name: Cleanup old patch assets
        env:
          GITHUB_TOKEN: ${{ github.token }}
          API_URL: https://api.github.com/repos/${{ github.repository }}/releases?per_page=20
        shell: bash
        run: |
          set -euo pipefail
          python .github/scripts/cleanup_old_patch_assets.py
